<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Continuum AI — Your personal health intelligence system." />
  <title>Continuum AI</title>
  <style>
    /* ── Reset ───────────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #08090D;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #root {
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #08090D;
    }

    /* ── Text selection ──────────────────────────────────────────────── */
    * {
      -webkit-user-select: none;
      user-select: none;
    }
    input, textarea, [contenteditable], [data-selectable] {
      -webkit-user-select: text;
      user-select: text;
    }

    /* ── Custom scrollbar — dark theme ──────────────────────────────── */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #252838;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #353852;
    }
    * {
      scrollbar-width: thin;
      scrollbar-color: #252838 transparent;
    }

    /* ── Smooth scrolling ────────────────────────────────────────────── */
    html {
      scroll-behavior: smooth;
    }

    /* ── Cursor ──────────────────────────────────────────────────────── */
    button, [role="button"], a {
      cursor: pointer;
    }
    input, textarea {
      cursor: text;
    }

    /* ── Focus styles — keep accessible but subtle ───────────────────── */
    :focus-visible {
      outline: 2px solid rgba(79, 126, 255, 0.6);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* ── Loading state ───────────────────────────────────────────────── */
    #root:empty::after {
      content: '';
      display: block;
      width: 36px;
      height: 36px;
      border: 3px solid rgba(79, 126, 255, 0.15);
      border-top-color: #4F7EFF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Phone frame — prevents overscroll bleed on webkit ───────────── */
    .phone-frame, [data-phone-frame] {
      overscroll-behavior: contain;
    }

    /* ── Prevent pull-to-refresh on Chrome mobile ────────────────────── */
    body {
      overscroll-behavior-y: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
